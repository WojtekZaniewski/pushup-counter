<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pushup Counter</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pushups">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
      padding: 1.5rem 1rem;
      min-height: 100dvh;
    }
    .container { max-width: 420px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      position: relative;
    }
    .header h1 {
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      color: #22c55e;
    }
    .profile-toggle {
      position: absolute;
      right: 0;
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    /* Profile */
    .profile {
      background: #141414;
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .profile-motifs {
      text-align: center;
      font-size: 1.2rem;
      margin-bottom: 0.75rem;
      letter-spacing: 0.3em;
    }
    .profile-field {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }
    .profile-field label {
      font-size: 0.7rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      width: 55px;
      flex-shrink: 0;
    }
    .profile-field input {
      flex: 1;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e5e5e5;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.4rem 0.6rem;
    }
    .profile-field input:focus {
      outline: none;
      border-color: #22c55e;
    }
    .profile-field input[type="number"] {
      -moz-appearance: textfield;
    }
    .profile-field input::-webkit-outer-spin-button,
    .profile-field input::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }
    .weight-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .weight-row input { flex: 1; }
    .weight-delta {
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .weight-delta.loss { color: #22c55e; }
    .weight-delta.gain { color: #ef4444; }

    /* Stats */
    .stats { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .stat {
      flex: 1;
      background: #141414;
      border-radius: 10px;
      padding: 0.75rem 0.5rem;
      text-align: center;
    }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: #fff; }
    .stat-label { font-size: 0.65rem; color: #666; margin-top: 0.25rem; letter-spacing: 0.1em; text-transform: uppercase; }

    /* Selected day panel */
    .today {
      background: #141414;
      border-radius: 10px;
      padding: 1.25rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .today-date { font-size: 0.75rem; color: #666; margin-bottom: 0.5rem; }
    .today-input {
      background: #0a0a0a;
      border: 2px solid #333;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 3rem;
      font-weight: 700;
      text-align: center;
      width: 100%;
      max-width: 160px;
      padding: 0.25rem 0.5rem;
      margin: 0 auto 0.5rem;
      display: block;
      -moz-appearance: textfield;
    }
    .today-input:focus {
      outline: none;
      border-color: #22c55e;
    }
    .today-input::-webkit-outer-spin-button,
    .today-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .today-hint {
      font-size: 0.65rem;
      color: #444;
      margin-bottom: 0.75rem;
    }

    /* Mood selector */
    .mood-label {
      font-size: 0.65rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    .mood-row {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
    }
    .mood-btn {
      font-size: 1.4rem;
      background: #0a0a0a;
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 0.35rem 0.5rem;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .mood-btn:active { transform: scale(0.9); }
    .mood-btn.active {
      border-color: #22c55e;
      background: #22c55e15;
    }

    /* Calendar */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .cal-nav button {
      background: none; border: none; color: #666;
      font-size: 1.2rem; cursor: pointer; padding: 0.25rem 0.5rem;
      font-family: inherit;
    }
    .cal-nav button:hover { color: #e5e5e5; }
    .cal-title { font-size: 0.85rem; color: #999; }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      text-align: center;
    }
    .cal-dow {
      font-size: 0.6rem;
      color: #444;
      padding: 0.25rem 0;
      text-transform: uppercase;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 0.65rem;
      color: #555;
      position: relative;
      gap: 1px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-day.future { cursor: default; opacity: 0.25; }
    .cal-day.current-month { color: #999; }
    .cal-day.has-data {
      background: #22c55e22;
      color: #22c55e;
    }
    .cal-day.is-today {
      outline: 2px solid #22c55e;
      outline-offset: -2px;
    }
    .cal-day.selected {
      outline: 2px solid #fff;
      outline-offset: -2px;
    }
    .cal-day.is-today.selected {
      outline: 2px solid #fff;
    }
    .cal-day .day-num {
      font-size: 0.6rem;
      line-height: 1;
    }
    .cal-day .day-count {
      font-size: 0.85rem;
      font-weight: 700;
      color: #22c55e;
      line-height: 1;
    }
    .cal-day .day-mood {
      font-size: 0.55rem;
      line-height: 1;
    }

    /* Notification banner */
    .notif-banner {
      background: #141414;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .notif-banner p {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 0.75rem;
      line-height: 1.4;
    }
    .notif-banner .notif-time {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .notif-banner input[type="time"] {
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e5e5e5;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.4rem 0.6rem;
      text-align: center;
    }
    .notif-banner label {
      font-size: 0.75rem;
      color: #666;
    }
    .notif-btns {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .notif-btns button {
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.25rem;
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .notif-btns .btn-yes {
      background: #22c55e;
      color: #0a0a0a;
      font-weight: 600;
    }
    .notif-btns .btn-no {
      background: #222;
      color: #666;
    }
    .notif-btns button:active { transform: scale(0.95); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>PUSHUP COUNTER</h1>
      <button class="profile-toggle" onclick="toggleProfile()">👤</button>
    </div>

    <!-- Profile -->
    <div class="profile hidden" id="profile">
      <div class="profile-motifs">💪 🏋️ 🔥 ⚡ ✨</div>
      <div class="profile-field">
        <label>Name</label>
        <input type="text" id="prof-name" placeholder="Your name"
          oninput="saveProfile()">
      </div>
      <div class="profile-field">
        <label>Age</label>
        <input type="number" id="prof-age" inputmode="numeric" placeholder="25"
          oninput="saveProfile()">
      </div>
      <div class="profile-field">
        <label>Weight</label>
        <div class="weight-row">
          <input type="number" id="prof-weight" inputmode="decimal" placeholder="kg" step="0.1"
            onchange="updateWeight()">
          <span class="weight-delta" id="weight-delta"></span>
        </div>
      </div>
    </div>

    <!-- Notification prompt -->
    <div class="notif-banner hidden" id="notif-banner">
      <p>Get a daily reminder to do your push-ups?</p>
      <div class="notif-time">
        <label for="notif-hour">Remind at</label>
        <input type="time" id="notif-hour" value="09:00">
      </div>
      <div class="notif-btns">
        <button class="btn-no" onclick="dismissNotif()">No thanks</button>
        <button class="btn-yes" onclick="enableNotif()">Enable</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="streak">0</div>
        <div class="stat-label">Streak</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="since">&mdash;</div>
        <div class="stat-label">Since</div>
      </div>
    </div>

    <div class="today">
      <div class="today-date" id="today-date"></div>
      <input type="tel" class="today-input" id="today-input"
        inputmode="numeric" pattern="[0-9]*" placeholder="0"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')"
        onchange="setPushups(this.value)" onkeydown="if(event.key==='Enter'){this.blur()}">
      <div class="today-hint">tap to type count</div>
      <div class="mood-label">how are you feeling?</div>
      <div class="mood-row" id="mood-row"></div>
    </div>

    <div class="calendar">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">&larr;</button>
        <span class="cal-title" id="cal-title"></span>
        <button onclick="changeMonth(1)">&rarr;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <script>
    let data = {};
    let moods = {};
    let profile = { name: '', age: '', weight: '', weightHistory: [] };
    let viewYear, viewMonth;
    let selectedKey;
    let profileOpen = false;

    const MOODS = ['🔥', '😊', '😐', '😓', '💀'];

    // --- Data ---
    function loadData() {
      try { data = JSON.parse(localStorage.getItem('pushups')) || {}; } catch { data = {}; }
      try { moods = JSON.parse(localStorage.getItem('pushups_moods')) || {}; } catch { moods = {}; }
      try {
        const p = JSON.parse(localStorage.getItem('pushups_profile'));
        if (p) profile = { name: '', age: '', weight: '', weightHistory: [], ...p };
      } catch {}
    }

    function saveData() { localStorage.setItem('pushups', JSON.stringify(data)); }
    function saveMoods() { localStorage.setItem('pushups_moods', JSON.stringify(moods)); }
    function saveProfileData() { localStorage.setItem('pushups_profile', JSON.stringify(profile)); }

    function dateKey(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    function todayKey() { return dateKey(new Date()); }

    // --- Profile ---
    function toggleProfile() {
      profileOpen = !profileOpen;
      const el = document.getElementById('profile');
      el.classList.toggle('hidden', !profileOpen);
      if (profileOpen) renderProfile();
    }

    function renderProfile() {
      document.getElementById('prof-name').value = profile.name;
      document.getElementById('prof-age').value = profile.age;
      document.getElementById('prof-weight').value = profile.weight;
      renderWeightDelta();
    }

    function saveProfile() {
      profile.name = document.getElementById('prof-name').value;
      profile.age = document.getElementById('prof-age').value;
      saveProfileData();
    }

    function updateWeight() {
      const val = parseFloat(document.getElementById('prof-weight').value);
      if (isNaN(val) || val <= 0) return;
      profile.weight = val;
      profile.weightHistory.push({ date: todayKey(), value: val });
      saveProfileData();
      renderWeightDelta();
    }

    function renderWeightDelta() {
      const el = document.getElementById('weight-delta');
      const h = profile.weightHistory;
      if (!h || h.length < 2) { el.textContent = ''; return; }
      const first = h[0].value;
      const current = h[h.length - 1].value;
      const diff = current - first;
      const sign = diff > 0 ? '+' : '';
      el.textContent = `${sign}${diff.toFixed(1)} kg`;
      el.className = 'weight-delta ' + (diff < 0 ? 'loss' : diff > 0 ? 'gain' : '');
    }

    // --- Day selection & pushups ---
    function selectDay(key) {
      if (key > todayKey()) return;
      selectedKey = key;
      render();
    }

    function setPushups(val) {
      const n = parseInt(val, 10);
      if (!n || n <= 0) delete data[selectedKey];
      else data[selectedKey] = n;
      saveData();
      render();
    }

    // --- Mood ---
    function setMood(emoji) {
      if (moods[selectedKey] === emoji) delete moods[selectedKey];
      else moods[selectedKey] = emoji;
      saveMoods();
      render();
    }

    // --- Stats ---
    function getTotal() { return Object.values(data).reduce((s, v) => s + v, 0); }

    function getStreak() {
      let d = new Date();
      let streak = 0;
      if (!data[dateKey(d)]) d.setDate(d.getDate() - 1);
      while (data[dateKey(d)]) { streak++; d.setDate(d.getDate() - 1); }
      return streak;
    }

    function getStartDate() {
      const keys = Object.keys(data).sort();
      if (!keys.length) return '\u2014';
      const [y, m, d] = keys[0].split('-');
      return `${d}.${m}.${y}`;
    }

    // --- Rendering ---
    function renderStats() {
      document.getElementById('total').textContent = getTotal();
      document.getElementById('streak').textContent = getStreak();
      document.getElementById('since').textContent = getStartDate();
    }

    function renderSelectedDay() {
      const [y, m, d] = selectedKey.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      const isToday = selectedKey === todayKey();
      const opts = { weekday: 'long', day: 'numeric', month: 'long' };
      const label = date.toLocaleDateString('en-US', opts);
      document.getElementById('today-date').textContent =
        isToday ? 'Today \u2014 ' + label : label;
      document.getElementById('today-input').value = data[selectedKey] || '';

      // Mood buttons
      const row = document.getElementById('mood-row');
      row.innerHTML = '';
      MOODS.forEach(emoji => {
        const btn = document.createElement('button');
        btn.className = 'mood-btn' + (moods[selectedKey] === emoji ? ' active' : '');
        btn.textContent = emoji;
        btn.addEventListener('click', () => setMood(emoji));
        row.appendChild(btn);
      });
    }

    function renderCalendar() {
      const months = ['January','February','March','April','May','June',
        'July','August','September','October','November','December'];
      document.getElementById('cal-title').textContent =
        months[viewMonth] + ' ' + viewYear;

      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';

      const dows = ['Mo','Tu','We','Th','Fr','Sa','Su'];
      dows.forEach(d => {
        const el = document.createElement('div');
        el.className = 'cal-dow';
        el.textContent = d;
        grid.appendChild(el);
      });

      const firstDay = new Date(viewYear, viewMonth, 1);
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      let startOffset = (firstDay.getDay() + 6) % 7;
      const today = todayKey();

      function dayCell(day, key, cls) {
        const el = document.createElement('div');
        const isFuture = key > today;
        if (isFuture) cls += ' future';
        if (key === selectedKey) cls += ' selected';
        if (key === today) cls += ' is-today';
        el.className = cls;
        let html = `<span class="day-num">${day}</span>`;
        if (data[key]) html += `<span class="day-count">${data[key]}</span>`;
        if (moods[key]) html += `<span class="day-mood">${moods[key]}</span>`;
        el.innerHTML = html;
        if (!isFuture) el.addEventListener('click', () => selectDay(key));
        return el;
      }

      const prevDays = new Date(viewYear, viewMonth, 0).getDate();
      for (let i = startOffset - 1; i >= 0; i--) {
        const day = prevDays - i;
        const key = dateKey(new Date(viewYear, viewMonth - 1, day));
        grid.appendChild(dayCell(day, key, 'cal-day' + (data[key] ? ' has-data' : '')));
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const key = dateKey(new Date(viewYear, viewMonth, day));
        let cls = 'cal-day current-month';
        if (data[key]) cls += ' has-data';
        grid.appendChild(dayCell(day, key, cls));
      }

      const totalCells = startOffset + daysInMonth;
      const remaining = (7 - (totalCells % 7)) % 7;
      for (let day = 1; day <= remaining; day++) {
        const key = dateKey(new Date(viewYear, viewMonth + 1, day));
        grid.appendChild(dayCell(day, key, 'cal-day' + (data[key] ? ' has-data' : '')));
      }
    }

    function changeMonth(dir) {
      viewMonth += dir;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      renderCalendar();
    }

    function render() {
      renderStats();
      renderSelectedDay();
      renderCalendar();
    }

    // --- Notifications ---
    function dismissNotif() {
      localStorage.setItem('pushups_notif', 'dismissed');
      document.getElementById('notif-banner').classList.add('hidden');
    }

    async function enableNotif() {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') { dismissNotif(); return; }
      const time = document.getElementById('notif-hour').value || '09:00';
      localStorage.setItem('pushups_notif', 'enabled');
      localStorage.setItem('pushups_notif_time', time);
      document.getElementById('notif-banner').classList.add('hidden');
      scheduleNotification();
    }

    function scheduleNotification() {
      const time = localStorage.getItem('pushups_notif_time');
      if (!time || localStorage.getItem('pushups_notif') !== 'enabled') return;
      const [h, m] = time.split(':').map(Number);
      const now = new Date();
      const target = new Date();
      target.setHours(h, m, 0, 0);
      if (target <= now) target.setDate(target.getDate() + 1);
      setTimeout(() => {
        if (Notification.permission === 'granted') {
          new Notification('Pushup Counter', { body: 'Time to do your push-ups!', icon: 'icon-192.png' });
        }
        scheduleNotification();
      }, target - now);
    }

    function initNotifications() {
      const state = localStorage.getItem('pushups_notif');
      if (!state && 'Notification' in window) {
        document.getElementById('notif-banner').classList.remove('hidden');
      } else if (state === 'enabled') {
        scheduleNotification();
      }
    }

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    // Init
    loadData();
    const now = new Date();
    viewYear = now.getFullYear();
    viewMonth = now.getMonth();
    selectedKey = todayKey();
    render();
    initNotifications();
  </script>
</body>
</html>
