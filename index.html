<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pushup Counter</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pushups">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
      padding: 1.5rem 1rem;
      min-height: 100dvh;
    }
    .container { max-width: 420px; margin: 0 auto; }
    h1 {
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      color: #22c55e;
      margin-bottom: 1.5rem;
    }

    /* Stats */
    .stats { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .stat {
      flex: 1;
      background: #141414;
      border-radius: 10px;
      padding: 0.75rem 0.5rem;
      text-align: center;
    }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: #fff; }
    .stat-label { font-size: 0.65rem; color: #666; margin-top: 0.25rem; letter-spacing: 0.1em; text-transform: uppercase; }

    /* Selected day panel */
    .today {
      background: #141414;
      border-radius: 10px;
      padding: 1.25rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .today-date { font-size: 0.75rem; color: #666; margin-bottom: 0.5rem; }
    .today-input {
      background: #0a0a0a;
      border: 2px solid #333;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 3rem;
      font-weight: 700;
      text-align: center;
      width: 100%;
      max-width: 160px;
      padding: 0.25rem 0.5rem;
      margin: 0 auto 0.5rem;
      display: block;
      -moz-appearance: textfield;
    }
    .today-input:focus {
      outline: none;
      border-color: #22c55e;
    }
    .today-input::-webkit-outer-spin-button,
    .today-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .today-hint {
      font-size: 0.65rem;
      color: #444;
    }

    /* Calendar */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .cal-nav button {
      background: none; border: none; color: #666;
      font-size: 1.2rem; cursor: pointer; padding: 0.25rem 0.5rem;
      font-family: inherit;
    }
    .cal-nav button:hover { color: #e5e5e5; }
    .cal-title { font-size: 0.85rem; color: #999; }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      text-align: center;
    }
    .cal-dow {
      font-size: 0.6rem;
      color: #444;
      padding: 0.25rem 0;
      text-transform: uppercase;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 0.65rem;
      color: #555;
      position: relative;
      gap: 1px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-day.future { cursor: default; opacity: 0.25; }
    .cal-day.current-month { color: #999; }
    .cal-day.has-data {
      background: #22c55e22;
      color: #22c55e;
    }
    .cal-day.is-today {
      outline: 2px solid #22c55e;
      outline-offset: -2px;
    }
    .cal-day.selected {
      outline: 2px solid #fff;
      outline-offset: -2px;
    }
    .cal-day.is-today.selected {
      outline: 2px solid #fff;
    }
    .cal-day .day-num {
      font-size: 0.6rem;
      line-height: 1;
    }
    .cal-day .day-count {
      font-size: 0.85rem;
      font-weight: 700;
      color: #22c55e;
      line-height: 1;
    }

    /* Notification banner */
    .notif-banner {
      background: #141414;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .notif-banner p {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 0.75rem;
      line-height: 1.4;
    }
    .notif-banner .notif-time {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .notif-banner input[type="time"] {
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e5e5e5;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.4rem 0.6rem;
      text-align: center;
    }
    .notif-banner label {
      font-size: 0.75rem;
      color: #666;
    }
    .notif-btns {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .notif-btns button {
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.25rem;
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .notif-btns .btn-yes {
      background: #22c55e;
      color: #0a0a0a;
      font-weight: 600;
    }
    .notif-btns .btn-no {
      background: #222;
      color: #666;
    }
    .notif-btns button:active { transform: scale(0.95); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PUSHUP COUNTER</h1>

    <!-- Notification prompt -->
    <div class="notif-banner hidden" id="notif-banner">
      <p>Get a daily reminder to do your push-ups?</p>
      <div class="notif-time">
        <label for="notif-hour">Remind at</label>
        <input type="time" id="notif-hour" value="09:00">
      </div>
      <div class="notif-btns">
        <button class="btn-no" onclick="dismissNotif()">No thanks</button>
        <button class="btn-yes" onclick="enableNotif()">Enable</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="streak">0</div>
        <div class="stat-label">Streak</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="since">&mdash;</div>
        <div class="stat-label">Since</div>
      </div>
    </div>

    <div class="today">
      <div class="today-date" id="today-date"></div>
      <input type="number" class="today-input" id="today-input"
        inputmode="numeric" min="0" placeholder="0"
        onchange="setPushups(this.value)" onkeydown="if(event.key==='Enter'){this.blur()}">
      <div class="today-hint">tap to type count</div>
    </div>

    <div class="calendar">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">&larr;</button>
        <span class="cal-title" id="cal-title"></span>
        <button onclick="changeMonth(1)">&rarr;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <script>
    let data = {};
    let viewYear, viewMonth;
    let selectedKey; // currently selected day key (YYYY-MM-DD)

    function loadData() {
      try { data = JSON.parse(localStorage.getItem('pushups')) || {}; }
      catch { data = {}; }
    }

    function saveData() {
      localStorage.setItem('pushups', JSON.stringify(data));
    }

    function dateKey(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    function todayKey() { return dateKey(new Date()); }

    function selectDay(key) {
      if (key > todayKey()) return; // no future days
      selectedKey = key;
      render();
    }

    function setPushups(val) {
      const n = parseInt(val, 10);
      if (!n || n <= 0) delete data[selectedKey];
      else data[selectedKey] = n;
      saveData();
      render();
    }

    function getTotal() {
      return Object.values(data).reduce((s, v) => s + v, 0);
    }

    function getStreak() {
      let d = new Date();
      let streak = 0;
      if (!data[dateKey(d)]) d.setDate(d.getDate() - 1);
      while (data[dateKey(d)]) {
        streak++;
        d.setDate(d.getDate() - 1);
      }
      return streak;
    }

    function getStartDate() {
      const keys = Object.keys(data).sort();
      if (!keys.length) return '\u2014';
      const [y, m, d] = keys[0].split('-');
      return `${d}.${m}.${y}`;
    }

    function renderStats() {
      document.getElementById('total').textContent = getTotal();
      document.getElementById('streak').textContent = getStreak();
      document.getElementById('since').textContent = getStartDate();
    }

    function renderSelectedDay() {
      const [y, m, d] = selectedKey.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      const isToday = selectedKey === todayKey();
      const opts = { weekday: 'long', day: 'numeric', month: 'long' };
      const label = date.toLocaleDateString('en-US', opts);
      document.getElementById('today-date').textContent =
        isToday ? 'Today — ' + label : label;
      const input = document.getElementById('today-input');
      input.value = data[selectedKey] || '';
    }

    function renderCalendar() {
      const months = ['January','February','March','April','May','June',
        'July','August','September','October','November','December'];
      document.getElementById('cal-title').textContent =
        months[viewMonth] + ' ' + viewYear;

      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';

      const dows = ['Mo','Tu','We','Th','Fr','Sa','Su'];
      dows.forEach(d => {
        const el = document.createElement('div');
        el.className = 'cal-dow';
        el.textContent = d;
        grid.appendChild(el);
      });

      const firstDay = new Date(viewYear, viewMonth, 1);
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      let startOffset = (firstDay.getDay() + 6) % 7;
      const today = todayKey();

      function dayCell(day, key, cls) {
        const el = document.createElement('div');
        const isFuture = key > today;
        if (isFuture) cls += ' future';
        if (key === selectedKey) cls += ' selected';
        if (key === today) cls += ' is-today';
        el.className = cls;
        el.innerHTML = `<span class="day-num">${day}</span>` +
          (data[key] ? `<span class="day-count">${data[key]}</span>` : '');
        if (!isFuture) el.addEventListener('click', () => selectDay(key));
        return el;
      }

      // Previous month trailing days
      const prevDays = new Date(viewYear, viewMonth, 0).getDate();
      for (let i = startOffset - 1; i >= 0; i--) {
        const day = prevDays - i;
        const key = dateKey(new Date(viewYear, viewMonth - 1, day));
        grid.appendChild(dayCell(day, key, 'cal-day' + (data[key] ? ' has-data' : '')));
      }

      // Current month days
      for (let day = 1; day <= daysInMonth; day++) {
        const key = dateKey(new Date(viewYear, viewMonth, day));
        let cls = 'cal-day current-month';
        if (data[key]) cls += ' has-data';
        grid.appendChild(dayCell(day, key, cls));
      }

      // Next month leading days
      const totalCells = startOffset + daysInMonth;
      const remaining = (7 - (totalCells % 7)) % 7;
      for (let day = 1; day <= remaining; day++) {
        const key = dateKey(new Date(viewYear, viewMonth + 1, day));
        grid.appendChild(dayCell(day, key, 'cal-day' + (data[key] ? ' has-data' : '')));
      }
    }

    function changeMonth(dir) {
      viewMonth += dir;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      renderCalendar();
    }

    function render() {
      renderStats();
      renderSelectedDay();
      renderCalendar();
    }

    // --- Notifications ---
    function dismissNotif() {
      localStorage.setItem('pushups_notif', 'dismissed');
      document.getElementById('notif-banner').classList.add('hidden');
    }

    async function enableNotif() {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        dismissNotif();
        return;
      }
      const time = document.getElementById('notif-hour').value || '09:00';
      localStorage.setItem('pushups_notif', 'enabled');
      localStorage.setItem('pushups_notif_time', time);
      document.getElementById('notif-banner').classList.add('hidden');
      scheduleNotification();
    }

    function scheduleNotification() {
      const time = localStorage.getItem('pushups_notif_time');
      if (!time || localStorage.getItem('pushups_notif') !== 'enabled') return;

      const [h, m] = time.split(':').map(Number);
      const now = new Date();
      const target = new Date();
      target.setHours(h, m, 0, 0);
      if (target <= now) target.setDate(target.getDate() + 1);

      const ms = target - now;
      setTimeout(() => {
        if (Notification.permission === 'granted') {
          new Notification('Pushup Counter', {
            body: 'Time to do your push-ups!',
            icon: 'icon-192.png'
          });
        }
        // Schedule next day
        scheduleNotification();
      }, ms);
    }

    function initNotifications() {
      const state = localStorage.getItem('pushups_notif');
      if (!state && 'Notification' in window) {
        // First visit — show the banner
        document.getElementById('notif-banner').classList.remove('hidden');
      } else if (state === 'enabled') {
        scheduleNotification();
      }
      // If 'dismissed' — do nothing, banner stays hidden forever
    }

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    // Init
    loadData();
    const now = new Date();
    viewYear = now.getFullYear();
    viewMonth = now.getMonth();
    selectedKey = todayKey();
    render();
    initNotifications();
  </script>
</body>
</html>
